<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>深圳科创数据浏览</title>
<style>
  :root {
    --bg: #f4f6fa;
    --fg: #1c2a3a;
    --fg-muted: #6b7689;
    --fg-faint: #a8b1c0;
    --panel: #ffffff;
    --panel-alt: #f9fafc;
    --border: #e5e9f0;
    --border-strong: #cfd6e0;
    --accent: #2f5fd4;
    --accent-hover: #1f4db8;
    --accent-soft: #e5edff;
    --warn: #c66100;
    --warn-soft: #fff4e5;
    --danger: #b8253b;
    --danger-soft: #fbe7ea;
    --ok: #1e7a3a;
    --ok-soft: #e4f5ea;
    --low: #8b6a00;
    --low-accent: #d8a51a;
    --low-soft: #fff6da;
    --chip-bg: #eef2f9;
    --shadow: 0 1px 3px rgba(20,30,60,0.05), 0 0 0 1px rgba(20,30,60,0.02);
    --radius: 8px;
    --radius-sm: 4px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Helvetica Neue",
                 "Segoe UI", "Microsoft YaHei", "Source Han Sans CN", sans-serif;
    margin: 0; background: var(--bg); color: var(--fg); font-size: 14px; line-height: 1.5;
  }
  header {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 20px;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    margin: 0; font-size: 16px; font-weight: 600; color: var(--fg); letter-spacing: -0.01em;
  }
  header h1 .env { color: var(--fg-muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
  nav { display: flex; gap: 2px; }
  nav button {
    background: transparent; color: var(--fg-muted); border: none;
    padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 13px; font-weight: 500;
  }
  nav button.active { background: var(--accent-soft); color: var(--accent); }
  nav button:hover:not(.active) { color: var(--fg); background: var(--panel-alt); }
  #search {
    flex: 1; max-width: 300px; margin-left: auto;
    padding: 7px 12px; border: 1px solid var(--border); background: var(--panel-alt);
    color: var(--fg); border-radius: var(--radius-sm); font-size: 13px;
    transition: border-color 0.15s;
  }
  #search:focus { outline: none; border-color: var(--accent); background: #fff; }
  main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .stats { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .stat {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 16px; min-width: 110px;
  }
  .stat .label { color: var(--fg-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }
  .stat .value { font-size: 22px; font-weight: 600; color: var(--fg); margin-top: 2px; }
  .filter-bar {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 16px;
    display: none; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .filter-bar.visible { display: flex; }
  .filter-bar label {
    display: flex; flex-direction: column; gap: 4px; font-size: 11px;
    color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500;
  }
  .filter-bar select, .filter-bar input[type=text] {
    padding: 5px 9px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit; color: var(--fg); background: #fff;
    min-width: 140px;
  }
  .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: var(--accent); }
  .filter-bar .toggle {
    flex-direction: row; align-items: center; gap: 6px; font-size: 13px; color: var(--fg);
    cursor: pointer; padding: 7px 12px; background: var(--panel-alt);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    text-transform: none; letter-spacing: 0; font-weight: 500;
    align-self: flex-end;
  }
  .filter-bar .toggle:hover { border-color: var(--border-strong); }
  .filter-bar .toggle input { margin: 0; accent-color: var(--accent); }
  .filter-bar button.clear {
    margin-left: auto; padding: 5px 10px; background: transparent; color: var(--fg-muted);
    border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer;
    font-size: 12px;
  }
  .filter-bar button.clear:hover { color: var(--fg); border-color: var(--border-strong); }
  table {
    background: var(--panel); border-collapse: separate; border-spacing: 0; width: 100%;
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  th, td {
    padding: 9px 14px; text-align: left; font-size: 13px; vertical-align: top;
    border-bottom: 1px solid var(--border);
  }
  th {
    background: var(--panel-alt); color: var(--fg-muted); font-weight: 500;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover td {
    background: var(--accent-soft);
    cursor: pointer;
    box-shadow: inset 2px 0 0 var(--accent);
  }
  tbody tr.anomaly td { background: var(--warn-soft); }
  tbody tr.anomaly:hover td { background: #ffe8c7; }
  tbody tr.issue-detail-row:hover td {
    background: var(--panel-alt); box-shadow: none; cursor: default;
  }
  .pager {
    margin-top: 14px; display: flex; gap: 8px; align-items: center;
    font-size: 13px; color: var(--fg-muted);
  }
  .pager button {
    padding: 5px 12px; border: 1px solid var(--border); background: #fff;
    border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; color: var(--fg);
  }
  .pager button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pager button:disabled { opacity: 0.4; cursor: not-allowed; }
  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 11px;
    background: var(--chip-bg); color: var(--fg-muted); font-weight: 500; margin-right: 4px;
  }
  .badge.verified { background: var(--ok-soft); color: var(--ok); }
  .badge.candidate { background: var(--warn-soft); color: var(--warn); }
  .badge.rejected { background: var(--danger-soft); color: var(--danger); }
  .badge.accent { background: var(--accent-soft); color: var(--accent); }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 12px; font-size: 12px;
    background: var(--chip-bg); color: var(--fg); margin: 2px 4px 2px 0;
  }
  .chip.zh { background: #eff3f9; color: #334b69; }
  .chip.en { background: #f3edf7; color: #523e66; }
  .chip.mix { background: #eef5f0; color: #3f5b45; }
  .lang-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
  .chip.zh .lang-dot { background: #5b7aa5; }
  .chip.en .lang-dot { background: #8a6fa3; }
  .chip.mix .lang-dot { background: #6d9076; }
  .topic-bar {
    display: inline-block; width: 40px; height: 6px; background: var(--border);
    border-radius: 3px; vertical-align: middle; margin-left: 6px; position: relative;
  }
  .topic-bar > span {
    display: block; height: 100%; border-radius: 3px; background: var(--ok);
  }
  .topic-bar.low > span { background: var(--warn); }
  .topic-bar.verylow > span { background: var(--danger); }
  #detail {
    margin-top: 24px; background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; display: none;
  }
  #detail h3 { margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: -0.015em; }
  #detail h3 .en-name { color: var(--fg-muted); font-weight: 400; font-size: 15px; margin-left: 8px; }
  #detail .sub { color: var(--fg-muted); font-size: 13px; margin-bottom: 20px; }
  #detail section { margin-bottom: 22px; }
  #detail section:last-child { margin-bottom: 0; }
  #detail section h4 {
    font-size: 11px; margin: 0 0 10px; color: var(--fg-muted);
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  #detail h4 .count { color: var(--fg-faint); font-weight: 400; margin-left: 6px; }
  .grid { display: grid; grid-template-columns: 110px 1fr; gap: 6px 16px; font-size: 13px; }
  .grid dt { color: var(--fg-muted); font-weight: 500; }
  .grid dd { margin: 0; color: var(--fg); word-break: break-word; }
  .grid dd a { color: var(--accent); text-decoration: none; }
  .grid dd a:hover { text-decoration: underline; }
  .paper-item {
    padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    margin-bottom: 6px; background: var(--panel-alt);
  }
  .paper-item .title { font-weight: 500; color: var(--fg); margin-bottom: 4px; }
  .paper-item .meta { font-size: 12px; color: var(--fg-muted); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .paper-item .meta a { color: var(--accent); text-decoration: none; }
  .paper-item .meta a:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 40px; color: var(--fg-faint); font-style: italic; }
  #error {
    background: var(--danger-soft); border: 1px solid #f4c7ce; padding: 10px 14px;
    border-radius: var(--radius-sm); color: var(--danger); margin: 10px 0; display: none;
  }
  .load-more {
    display: inline-block; margin-top: 8px; padding: 5px 12px; background: var(--panel-alt);
    border: 1px solid var(--border); color: var(--fg-muted); border-radius: var(--radius-sm);
    cursor: pointer; font-size: 12px;
  }
  .load-more:hover { color: var(--fg); border-color: var(--border-strong); }
  .flag-btn {
    padding: 4px 10px; background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; color: var(--fg);
  }
  .flag-btn:hover { border-color: var(--warn); color: var(--warn); }
  code { background: var(--panel-alt); padding: 1px 5px; border-radius: 2px; font-size: 12px; }

  /* ============ Guard-runs strip (数据质量动态) ============ */
  .guard-strip-wrap {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px 14px;
  }
  .guard-strip-header {
    display: flex; align-items: baseline; gap: 10px;
    max-width: 1400px; margin: 0 auto 10px;
  }
  .guard-strip-header .title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--fg); font-weight: 700;
  }
  .guard-strip-header .title::before {
    content: ""; display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
    margin-right: 8px; vertical-align: 2px;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .guard-strip-header .sub {
    color: var(--fg-muted); font-size: 11px;
  }
  .guard-strip-scroll {
    position: relative; max-width: 1400px; margin: 0 auto;
  }
  .guard-strip-scroll::after {
    content: ""; position: absolute; top: 0; bottom: 4px; right: 0; width: 36px;
    background: linear-gradient(to right, transparent, var(--panel) 80%);
    pointer-events: none; border-radius: 0 var(--radius) var(--radius) 0;
  }
  .guard-strip {
    display: flex; gap: 10px;
    overflow-x: auto;
    scrollbar-width: thin;
    padding-bottom: 4px;
  }
  .guard-strip::-webkit-scrollbar { height: 6px; }
  .guard-strip::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  .guard-card {
    flex: 0 0 232px;
    background: var(--panel-alt);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 13px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .guard-card::before {
    content: ""; position: absolute; left: 0; top: 10px; bottom: 10px;
    width: 3px; border-radius: 2px;
    background: var(--border-strong);
    transition: background 0.15s;
  }
  .guard-card.has-high::before { background: var(--danger); }
  .guard-card.has-medium::before { background: var(--warn); }
  .guard-card.has-low::before { background: var(--low-accent); }
  .guard-card:hover {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 2px 6px rgba(47,95,212,0.08);
  }
  .guard-card .gc-round {
    font-size: 12px; font-weight: 600; color: var(--fg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: -0.005em;
  }
  .guard-card .gc-round .gc-tag {
    display: inline-block; font-variant-numeric: tabular-nums;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--chip-bg); color: var(--fg); padding: 0 5px;
    border-radius: 3px; margin-right: 5px; font-weight: 600;
  }
  .guard-card .gc-time {
    font-size: 11px; color: var(--fg-muted); margin-top: 2px;
  }
  .guard-card .gc-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 9px; gap: 8px;
  }
  .guard-card .gc-rows {
    font-size: 11px; color: var(--fg-muted);
  }
  .guard-card .gc-rows b {
    color: var(--fg); font-weight: 600; font-variant-numeric: tabular-nums;
  }
  .guard-card .gc-sev {
    display: flex; gap: 6px;
  }
  .sev-dot {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; color: var(--fg); font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .sev-dot::before {
    content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  }
  .sev-dot.high::before { background: var(--danger); box-shadow: 0 0 0 2px var(--danger-soft); }
  .sev-dot.medium::before { background: var(--warn); box-shadow: 0 0 0 2px var(--warn-soft); }
  .sev-dot.low::before { background: var(--low-accent); box-shadow: 0 0 0 2px var(--low-soft); }
  .sev-dot.none { color: var(--fg-faint); }
  .sev-dot.none::before { background: var(--border-strong); }
  .guard-card.skeleton {
    pointer-events: none;
    background: linear-gradient(90deg, var(--panel-alt) 0%, #f0f3f8 50%, var(--panel-alt) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    min-height: 72px;
  }
  .guard-card.skeleton::before { display: none; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ============ Issues tab ============ */
  .badge.sev-high {
    background: var(--danger-soft); color: var(--danger); font-weight: 600;
  }
  .badge.sev-medium {
    background: var(--warn-soft); color: var(--warn); font-weight: 600;
  }
  .badge.sev-low {
    background: var(--low-soft); color: var(--low); font-weight: 600;
  }
  .badge.sev-high::before,
  .badge.sev-medium::before,
  .badge.sev-low::before {
    content: ""; display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }
  .badge.sev-high::before { background: var(--danger); }
  .badge.sev-medium::before { background: var(--warn); }
  .badge.sev-low::before { background: var(--low-accent); }
  .badge.resolved-yes { background: var(--ok-soft); color: var(--ok); }
  .badge.resolved-no { background: var(--chip-bg); color: var(--fg-muted); }

  .issue-row .desc-cell {
    max-width: 480px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .issue-row .reported-cell {
    font-size: 12px; line-height: 1.35; white-space: nowrap;
  }
  .issue-row .reported-cell .rc-when {
    font-variant-numeric: tabular-nums; color: var(--fg);
  }
  .issue-row .reported-cell .rc-tag {
    display: inline-block; margin-top: 3px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 10.5px; color: var(--fg-muted);
    background: var(--chip-bg); padding: 1px 6px; border-radius: 3px;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; vertical-align: middle;
  }
  tr.issue-detail-row td {
    background: var(--panel-alt); padding: 14px 18px;
  }
  tr.issue-detail-row pre {
    margin: 0; font-size: 12px; line-height: 1.5;
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px; overflow-x: auto;
    color: var(--fg); max-height: 420px;
  }
  tr.issue-detail-row .detail-meta {
    display: flex; gap: 16px; margin-bottom: 10px;
    font-size: 12px; color: var(--fg-muted);
  }
  tr.issue-detail-row .detail-meta b { color: var(--fg); font-weight: 600; }

  /* Table row hover + skeleton shimmer */
  tbody tr.skeleton-row td {
    background: linear-gradient(90deg, var(--panel) 0%, var(--panel-alt) 50%, var(--panel) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    height: 34px;
  }
  tbody tr.skeleton-row td > span {
    display: inline-block; height: 10px; border-radius: 3px;
    background: var(--border); width: 70%;
  }

  /* Responsive down to 900px */
  @media (max-width: 1024px) {
    header { padding: 10px 16px; flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 15px; }
    #search { max-width: none; width: 100%; margin-left: 0; order: 3; }
    main { padding: 16px; }
    .guard-strip-wrap { padding: 10px 16px; }
    .guard-strip-header, .guard-strip { max-width: none; }
  }
  @media (max-width: 900px) {
    nav { flex-wrap: wrap; }
    .filter-bar { padding: 10px 12px; gap: 10px; }
    .filter-bar select, .filter-bar input[type=text] { min-width: 120px; }
    #list-wrapper { overflow-x: auto; }
    table { min-width: 720px; }
  }
</style>
</head>
<body>

<header>
  <h1>深圳科创数据 <span class="env">· miroflow_real</span></h1>
  <nav id="tabs">
    <button data-domain="companies" class="active">企业</button>
    <button data-domain="professors">教授</button>
    <button data-domain="papers">论文</button>
    <button data-domain="patents">专利</button>
    <button data-domain="issues">Issues</button>
    <button data-domain="pipeline">Pipeline 诊断</button>
    <button data-domain="review">人工审核</button>
  </nav>
  <input id="search" placeholder="按名称 / 关键词搜索…（回车）">
</header>

<!-- 数据质量动态 strip (guard runs) -->
<div class="guard-strip-wrap" id="guard-strip-wrap">
  <div class="guard-strip-header">
    <span class="title">数据质量动态</span>
    <span class="sub" id="guard-strip-sub">最近 7 天 guard 轮次 · 点击跳转到 Issues</span>
  </div>
  <div class="guard-strip-scroll">
    <div class="guard-strip" id="guard-strip"></div>
  </div>
</div>

<main>
  <div class="stats" id="stats"></div>

  <!-- Pipeline Issues filter bar -->
  <div class="filter-bar" id="issues-filters">
    <label>Stage
      <select id="if-stage">
        <option value="">全部 stage</option>
        <option value="discovery">discovery</option>
        <option value="name_extraction">name_extraction</option>
        <option value="affiliation">affiliation</option>
        <option value="paper_attribution">paper_attribution</option>
        <option value="paper_quality">paper_quality</option>
        <option value="research_directions">research_directions</option>
        <option value="identity_gate">identity_gate</option>
        <option value="coverage">coverage</option>
        <option value="data_quality_flag">data_quality_flag</option>
      </select>
    </label>
    <label>Severity
      <select id="if-severity">
        <option value="">全部 severity</option>
        <option value="high">high</option>
        <option value="medium">medium</option>
        <option value="low">low</option>
      </select>
    </label>
    <label>Reported by
      <select id="if-reported-by"><option value="">全部来源</option></select>
    </label>
    <label class="toggle">
      <input type="checkbox" id="if-resolved">
      只看未解决
    </label>
    <label>描述搜索
      <input type="text" id="if-q" placeholder="关键词…（回车）">
    </label>
    <button class="clear" id="if-clear">清空筛选</button>
  </div>

  <!-- Professor-specific faceted filters -->
  <div class="filter-bar" id="prof-filters">
    <label>机构
      <select id="f-institution"><option value="">全部机构</option></select>
    </label>
    <label>学科
      <select id="f-discipline">
        <option value="">全部学科</option>
        <option value="computer_science">计算机科学</option>
        <option value="electrical_engineering">电气工程</option>
        <option value="mechanical_engineering">机械工程</option>
        <option value="materials">材料科学</option>
        <option value="biomedical">生物医学</option>
        <option value="mathematics">数学</option>
        <option value="physics">物理</option>
        <option value="chemistry">化学</option>
        <option value="interdisciplinary">交叉学科</option>
        <option value="other">其他</option>
      </select>
    </label>
    <label class="toggle">
      <input type="checkbox" id="f-verified-only">
      只看有 verified 论文的
    </label>
    <button class="clear" id="f-clear">清空筛选</button>
  </div>

  <div id="error"></div>
  <div id="list-wrapper">
    <table id="list-table"><thead></thead><tbody></tbody></table>
    <div class="pager">
      <button id="prev">上一页</button>
      <span id="page-info"></span>
      <button id="next">下一页</button>
    </div>
  </div>
  <div id="detail"></div>
</main>

<script>
// ============ Discipline i18n (Round 9.1a) ============

// ============ Utilities ============
function detectLang(text) {
  if (!text) return "";
  const hasZh = /[\u4e00-\u9fff]/.test(text);
  const hasEn = /[A-Za-z]/.test(text);
  if (hasZh && hasEn) return "mix";
  if (hasZh) return "zh";
  if (hasEn) return "en";
  return "";
}

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function topicBar(score) {
  if (score == null) return "";
  const pct = Math.round(score * 100);
  const cls = score < 0.7 ? "verylow" : score < 0.85 ? "low" : "";
  return `<span class="topic-bar ${cls}" title="topic consistency ${score.toFixed(2)}">
    <span style="width:${pct}%"></span></span>`;
}

// Format guard-run round ID like "round_7_18c_institution_cleanup" -> "R7.18c Institution Cleanup"
function prettyGuardRound(reportedBy) {
  if (!reportedBy) return "-";
  const m = reportedBy.match(/^round_(\d+)_(\d+)([a-z]?)(?:_(.+))?$/i);
  if (!m) {
    return reportedBy.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  }
  const [, major, minor, suffix, rest] = m;
  const tag = `R${major}.${minor}${suffix || ""}`;
  const label = rest
    ? rest.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase())
    : "";
  return label ? `${tag} · ${label}` : tag;
}

// "3h ago" / "yesterday" / "2d ago" / "just now"
function relativeTime(iso) {
  if (!iso) return "-";
  const then = new Date(iso);
  if (isNaN(then)) return "-";
  const diffMs = Date.now() - then.getTime();
  const sec = Math.floor(diffMs / 1000);
  if (sec < 60) return "just now";
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day === 1) return "yesterday";
  if (day < 7) return `${day}d ago`;
  if (day < 30) return `${Math.floor(day / 7)}w ago`;
  return then.toISOString().slice(0, 10);
}

// ============ API wrappers ============
async function apiList(domain, extraParams = {}) {
  const qs = new URLSearchParams({ page: currentPage, page_size: PAGE_SIZE });
  if (currentQuery) qs.set("q", currentQuery);
  for (const [k, v] of Object.entries(extraParams)) {
    if (v !== "" && v !== null && v !== undefined && v !== false) qs.set(k, v);
  }
  const url = `/api/data/${domain}?${qs}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${url}: ${r.status}`);
  return r.json();
}
async function apiDetail(domain, id) {
  const r = await fetch(`/api/data/${domain}/${encodeURIComponent(id)}`);
  if (!r.ok) throw new Error(`detail ${r.status}`);
  return r.json();
}

// ============ List rendering ============
function renderList(payload) {
  const cols = COLUMNS[currentDomain] || [];
  const thead = listTable.querySelector("thead");
  const tbody = listTable.querySelector("tbody");
  thead.innerHTML = "<tr>" + cols.map(c => `<th>${c.label}</th>`).join("") + "</tr>";
  const items = payload.items || [];
  currentTotal = payload.total || items.length || 0;
  if (items.length === 0) {
    tbody.innerHTML = `<tr><td class="empty" colspan="${cols.length || 1}">
      暂无数据${currentDomain === "patents" ? "（专利待 xlsx 导入）" : ""}</td></tr>`;
  } else {
    tbody.innerHTML = items.map(row => {
      const tds = cols.map(c => {
        const v = c.render ? c.render(row) : row[c.key];
        return `<td>${v == null ? "" : String(v)}</td>`;
      }).join("");
      const id = row.company_id || row.professor_id || row.paper_id || row.patent_id;
      return `<tr data-id="${id || ''}">${tds}</tr>`;
    }).join("");
    tbody.querySelectorAll("tr").forEach(tr => {
      tr.addEventListener("click", () => showDetail(tr.dataset.id));
    });
  }
  const pageCount = Math.max(1, Math.ceil(currentTotal / PAGE_SIZE));
  pageInfo.textContent = `共 ${currentTotal} 条 · 第 ${currentPage} / ${pageCount} 页`;
  document.getElementById("prev").disabled = currentPage <= 1;
  document.getElementById("next").disabled = currentPage * PAGE_SIZE >= currentTotal;
}

async function showDetail(id) {

function renderFact(f) {
  const text = f.value_raw || f.value_normalized || "";
  const lang = detectLang(text);
  const langDot = lang ? `<span class="lang-dot"></span>` : "";
  const cls = lang ? `chip ${lang}` : "chip";
  return `<span class="${cls}" title="${lang === 'mix' ? '中英混合' : lang === 'en' ? '英文' : '中文'}">
    ${langDot}${esc(text)}</span>`;
}

function renderPaperItem(p, statusClass) {
  const y = p.year ? `<span class="badge ${statusClass}">${p.year}</span>` : "";
  const cite = p.citation_count ? `<span>被引 ${p.citation_count}</span>` : "";
  const venue = p.venue ? `<span title="${esc(p.venue)}">${esc(p.venue).slice(0, 40)}</span>` : "";
  const tc = topicBar(p.topic_consistency_score);
  const src = p.source_page_url
    ? `<a href="${esc(p.source_page_url)}" target="_blank" rel="noopener">来源 ↗</a>`
    : "";
  const doi = p.doi ? `<a href="https://doi.org/${esc(p.doi)}" target="_blank" rel="noopener">DOI ↗</a>` : "";
  return `<div class="paper-item">
    <div class="title">${esc(p.title_clean || "(无标题)")}</div>
    <div class="meta">${y}${venue ? "· " + venue : ""}${cite ? "· " + cite : ""}
      ${tc}${src ? "· " + src : ""}${doi ? "· " + doi : ""}</div>
  </div>`;
}

async function loadPipelineView() {
  errorBox.style.display = "none";
  detail.style.display = "none";
  profFiltersEl.classList.remove("visible");
  statsBox.innerHTML = "";
  const tbody = listTable.querySelector("tbody");
  const thead = listTable.querySelector("thead");
  tbody.innerHTML = `<tr><td class="empty">加载中…</td></tr>`;
  try {
    const [coverage, sources] = await Promise.all([
      fetch("/api/pipeline/coverage-by-institution").then(r => r.json()),
      fetch("/api/pipeline/source-breakdown").then(r => r.json()),
    ]);
    const sb = sources.by_link_status || {};
    statsBox.innerHTML = Object.entries(sb).map(
      ([k, v]) => `<div class="stat"><div class="label">${esc(k)}</div><div class="value">${v}</div></div>`
    ).join("") + `<div class="stat"><div class="label">机构数</div><div class="value">${coverage.length}</div></div>`;
    thead.innerHTML = `<tr>
      <th>机构</th><th>教授</th><th>有 verified 论文</th><th>有研究方向</th>
      <th>空作者论文</th><th>Gate 拒绝率</th><th>平均主题贴合</th><th>异常</th>
    </tr>`;
    tbody.innerHTML = coverage.map(c => {
      const flags = (c.anomaly_flags || []).map(f => `<span class="badge candidate">${esc(f)}</span>`).join("");
      const rate = (c.identity_gate_rejection_rate * 100).toFixed(1);
      const topic = c.avg_topic_consistency_score == null ? "-" : c.avg_topic_consistency_score.toFixed(3);
      const rowCls = flags ? 'class="anomaly"' : "";
      return `<tr ${rowCls}><td>${esc(c.institution)}</td><td>${c.professor_count}</td>
        <td>${c.with_verified_papers}</td><td>${c.with_research_directions}</td>
        <td>${c.empty_authors_papers}</td><td>${rate}%</td>
        <td>${topic}</td><td>${flags || "-"}</td></tr>`;
    }).join("");
    const byApi = sources.by_evidence_api_source || {};
    const byVby = sources.by_verified_by || {};
    detail.style.display = "block";
    detail.innerHTML = `
      <h3>论文链来源分布</h3>
      <section><h4>按 evidence_api_source</h4>
        <dl class="grid">${Object.entries(byApi).sort((a,b) => b[1]-a[1]).slice(0,15).map(
          ([k, v]) => `<dt>${esc(k)}</dt><dd>${v}</dd>`).join("")}</dl></section>
      <section><h4>按 verified_by</h4>
        <dl class="grid">${Object.entries(byVby).map(
          ([k, v]) => `<dt>${esc(k || "(null)")}</dt><dd>${v}</dd>`).join("")}</dl></section>`;
    document.getElementById("prev").disabled = true;
    document.getElementById("next").disabled = true;
    pageInfo.textContent = `${coverage.length} 所机构`;
  } catch (e) {
    errorBox.style.display = "block";
    errorBox.textContent = `Pipeline 视图加载失败: ${e.message}`;
    tbody.innerHTML = "";
  }
}

    detail.innerHTML = `
      <h3>未解决 Pipeline Issues <span class="count">${issues.length}</span></h3>
      ${issues.length === 0 ? '<p class="empty">暂无未解决 issue</p>' : issues.map(i => `
        <section style="border-left:3px solid var(--border);padding-left:14px;margin-bottom:14px">
          <div><span class="badge accent">${esc(i.stage)}</span>
            <span class="badge ${i.severity === 'high' ? 'rejected' : i.severity === 'medium' ? 'candidate' : ''}">${esc(i.severity)}</span>
            <small style="color:var(--fg-muted)">${esc(i.reported_at.slice(0,16))} by ${esc(i.reported_by)}</small></div>
          <p style="margin:6px 0 2px">${esc(i.description)}</p>
          <small style="color:var(--fg-faint)">
            target: prof=${esc(i.professor_id||"-")} link=${esc(i.link_id||"-")} inst=${esc(i.institution||"-")}</small>
        </section>`).join("")}
      <p style="color:var(--fg-muted);font-size:12px;margin-top:20px">
        抽样可通过 URL 参数 <code>?seed=xxx</code> 固定；同一 seed 返回同一批教授。
      </p>`;
    document.getElementById("prev").disabled = true;
    document.getElementById("next").disabled = true;
    pageInfo.textContent = `${samples.length} 位随机教授 · ${issues.length} 条未解决 issue`;
  } catch (e) {
    errorBox.style.display = "block";
    errorBox.textContent = `审核视图加载失败: ${e.message}`;
    tbody.innerHTML = "";
  }
}

// ============ Guard-runs strip ============
async function loadGuardStrip() {
  // Skeleton
  guardStripEl.innerHTML = Array.from({ length: 4 }, () =>
    `<div class="guard-card skeleton"></div>`).join("");
  try {
    const r = await fetch("/api/pipeline-issues/guard-runs");
    if (!r.ok) throw new Error(`${r.status}`);
    const runs = await r.json();
    guardRunsCache = runs;
    populateReportedByDropdown(runs);
    if (!runs.length) {
      guardStripEl.innerHTML = `<div class="empty" style="padding:18px;width:100%">暂无 guard 轮次记录</div>`;
      return;
    }
    guardStripEl.innerHTML = runs.map(renderGuardCard).join("");
    guardStripEl.querySelectorAll(".guard-card").forEach(el => {
      el.addEventListener("click", () => {
        const rb = el.dataset.reportedBy;
        switchToIssuesFiltered({ reported_by: rb });
      });
    });
  } catch (e) {
    guardStripEl.innerHTML =
      `<div class="empty" style="padding:18px;width:100%;color:var(--danger)">
         guard 动态加载失败: ${esc(e.message)}
       </div>`;
  }
}

function renderGuardCard(run) {
  const sev = run.severity_breakdown || {};
  const sevHtml = ["high", "medium", "low"]
    .filter(k => sev[k])
    .map(k => `<span class="sev-dot ${k}">${sev[k]}</span>`)
    .join("");
  const rows7d = run.rows_last_7_days ?? 0;
  const pretty = prettyGuardRound(run.reported_by);
  // Split "R7.18c · Institution Cleanup" into tag + label
  const parts = pretty.split(" · ");
  const tag = parts[0];
  const label = parts.slice(1).join(" · ");
  // Dominant severity class for left border accent
  const dominant = sev.high ? "has-high" : sev.medium ? "has-medium" : sev.low ? "has-low" : "";
  return `
    <div class="guard-card ${dominant}" data-reported-by="${esc(run.reported_by)}"
         title="${esc(run.reported_by)}">
      <div class="gc-round">
        <span class="gc-tag">${esc(tag)}</span>${esc(label)}
      </div>
      <div class="gc-time">${esc(relativeTime(run.last_run_at))}</div>
      <div class="gc-footer">
        <span class="gc-rows"><b>${rows7d}</b> rows · 7d</span>
        <span class="gc-sev">${sevHtml || '<span class="sev-dot none">0</span>'}</span>
      </div>
    </div>`;
}

function populateReportedByDropdown(runs) {
  // Preserve current value
  const current = ifReportedBy.value;
  ifReportedBy.innerHTML = `<option value="">全部来源</option>` +
    runs.map(r => `<option value="${esc(r.reported_by)}">
      ${esc(prettyGuardRound(r.reported_by))}
    </option>`).join("");
  if (current) ifReportedBy.value = current;
}

function switchToIssuesFiltered(filters) {
  issueFilters = {
    stage: "", severity: "", reported_by: "", resolved: false, q: "",
    ...filters,
  };
  currentPage = 1;
  // Update filter-bar UI to reflect the filter
  ifStage.value = issueFilters.stage;
  ifSeverity.value = issueFilters.severity;
  ifReportedBy.value = issueFilters.reported_by;
  ifResolved.checked = issueFilters.resolved;
  ifQ.value = issueFilters.q;
  // Switch tab
  document.querySelectorAll("#tabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.domain === "issues");
  });
  currentDomain = "issues";
  loadDomain();
}

// ============ Issues view ============
async function loadIssuesView() {
  errorBox.style.display = "none";
  detail.style.display = "none";
  profFiltersEl.classList.remove("visible");
  issueFiltersEl.classList.add("visible");
  statsBox.innerHTML = "";
  expandedIssueId = null;

  const tbody = listTable.querySelector("tbody");
  const thead = listTable.querySelector("thead");
  thead.innerHTML = `<tr>
    <th style="width:160px">Stage</th>
    <th style="width:90px">Severity</th>
    <th>描述</th>
    <th style="width:120px">Reported</th>
    <th style="width:90px">Resolved</th>
  </tr>`;
  tbody.innerHTML = skeletonRows(5, 5);

  // Ensure guard runs loaded for dropdown
  if (!guardRunsCache) {
    await loadGuardStrip();
  }

  try {
    const qs = new URLSearchParams({ page: currentPage, page_size: PAGE_SIZE });
    if (issueFilters.stage) qs.set("stage", issueFilters.stage);
    if (issueFilters.severity) qs.set("severity", issueFilters.severity);
    if (issueFilters.reported_by) qs.set("reported_by", issueFilters.reported_by);
    if (issueFilters.q) qs.set("q", issueFilters.q);
    if (issueFilters.resolved) qs.set("resolved", "false"); // only unresolved when checked
    const r = await fetch(`/api/pipeline-issues?${qs}`);
    if (!r.ok) throw new Error(`${r.status}`);
    const payload = await r.json();
    renderIssuesTable(payload);
    currentTotal = payload.total || 0;
    const pageCount = Math.max(1, Math.ceil(currentTotal / PAGE_SIZE));
    pageInfo.textContent = `共 ${currentTotal} 条 · 第 ${currentPage} / ${pageCount} 页`;
    document.getElementById("prev").disabled = currentPage <= 1;
    document.getElementById("next").disabled = currentPage * PAGE_SIZE >= currentTotal;
    renderIssuesStats(payload);
  } catch (e) {
    errorBox.style.display = "block";
    errorBox.textContent = `Issues 加载失败: ${e.message}`;
    tbody.innerHTML = "";
  }
}

function renderIssuesStats(payload) {
  const sevCount = (guardRunsCache || []).reduce((acc, r) => {
    const s = r.severity_breakdown || {};
    acc.high += s.high || 0;
    acc.medium += s.medium || 0;
    acc.low += s.low || 0;
    return acc;
  }, { high: 0, medium: 0, low: 0 });
  statsBox.innerHTML = `
    <div class="stat"><div class="label">总数</div><div class="value">${payload.total}</div></div>
    <div class="stat"><div class="label">High (7d)</div><div class="value" style="color:var(--danger)">${sevCount.high}</div></div>
    <div class="stat"><div class="label">Medium (7d)</div><div class="value" style="color:var(--warn)">${sevCount.medium}</div></div>
    <div class="stat"><div class="label">Low (7d)</div><div class="value" style="color:var(--low)">${sevCount.low}</div></div>
  `;
}

function renderIssuesTable(payload) {
  const tbody = listTable.querySelector("tbody");
  const items = payload.items || [];
  if (!items.length) {
    tbody.innerHTML = `<tr><td class="empty" colspan="5">暂无匹配的 issues</td></tr>`;
    return;
  }
  tbody.innerHTML = items.map(it => {
    const sevCls = `sev-${it.severity || "low"}`;
    const resolvedBadge = it.resolved
      ? `<span class="badge resolved-yes">已解决</span>`
      : `<span class="badge resolved-no">未解决</span>`;
    // Compact reported: "R7.9" tag + relative time, full label in tooltip
    const roundPretty = prettyGuardRound(it.reported_by);
    const roundTag = roundPretty.split(" · ")[0];
    return `
      <tr class="issue-row" data-issue-id="${esc(it.issue_id)}">
        <td><code>${esc(it.stage || "-")}</code></td>
        <td><span class="badge ${sevCls}">${esc(it.severity || "-")}</span></td>
        <td class="desc-cell" title="${esc(it.description || "")}">${esc(it.description || "-")}</td>
        <td class="reported-cell">
          <div class="rc-when">${esc(relativeTime(it.reported_at))}</div>
          <span class="rc-tag" title="${esc(roundPretty)}">${esc(roundTag)}</span>
        </td>
        <td>${resolvedBadge}</td>
      </tr>`;
  }).join("");
  // Row click → toggle expanded detail row
  tbody.querySelectorAll(".issue-row").forEach(tr => {
    tr.addEventListener("click", () => {
      const id = tr.dataset.issueId;
      if (expandedIssueId === id) {
        expandedIssueId = null;
        renderIssuesTable(payload);
        return;
      }
      expandedIssueId = id;
      const item = items.find(i => i.issue_id === id);
      if (!item) return;
      // Remove any existing detail row
      tbody.querySelectorAll("tr.issue-detail-row").forEach(r => r.remove());
      const detailTr = document.createElement("tr");
      detailTr.className = "issue-detail-row";
      detailTr.innerHTML = `<td colspan="5">
        <div class="detail-meta">
          <span><b>issue_id:</b> <code>${esc(item.issue_id)}</code></span>
          ${item.professor_id ? `<span><b>professor_id:</b> <code>${esc(item.professor_id)}</code></span>` : ""}
          ${item.link_id ? `<span><b>link_id:</b> <code>${esc(item.link_id)}</code></span>` : ""}
          ${item.institution ? `<span><b>institution:</b> ${esc(item.institution)}</span>` : ""}
        </div>
        <pre>${esc(JSON.stringify(item.evidence_snapshot || {}, null, 2))}</pre>
      </td>`;
      tr.insertAdjacentElement("afterend", detailTr);
    });
  });
}

function skeletonRows(n, cols) {
  return Array.from({ length: n }, () =>
    `<tr class="skeleton-row">${
      Array.from({ length: cols }, () => `<td><span></span></td>`).join("")
    }</tr>`
  ).join("");
}

async function flagProf(professorId, name) {
  const description = prompt(`为教授 ${name} 填写问题描述（是哪一步出了问题？）`);
  if (!description) return;
  const stage = prompt(
    "问题属于哪个 pipeline stage？\n" +
    "discovery / name_extraction / affiliation / paper_attribution / " +
    "paper_quality / research_directions / identity_gate / coverage / data_quality_flag",
    "data_quality_flag"
  );
  if (!stage) return;
  const reportedBy = prompt("你的名字 / 邮箱：", "admin");
  if (!reportedBy) return;
  try {
    const r = await fetch("/api/review/issues", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ professor_id: professorId, stage, severity: "medium", description, reported_by: reportedBy }),
    });
    if (r.status === 409) { alert("已有重复的未解决 issue"); return; }
    if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
    alert("已记录到 pipeline_issue 队列 ✓");
    loadReviewView();
  } catch (e) {
    alert(`提交失败: ${e.message}`);
  }
}

// ============ Load domain ============
async function loadDomain() {
  if (currentDomain === "pipeline") return loadPipelineView();
  if (currentDomain === "review") return loadReviewView();
  if (currentDomain === "issues") return loadIssuesView();
  errorBox.style.display = "none";
  detail.style.display = "none";
  statsBox.innerHTML = "";
  issueFiltersEl.classList.remove("visible");
  listTable.querySelector("tbody").innerHTML = skeletonRows(5, 5);

  // Show/hide filter bar
  if (currentDomain === "professors") {
    profFiltersEl.classList.add("visible");
    // Lazy-load institution dropdown
    if (fInst.options.length <= 1) {
      const facets = await apiInstitutionFacets();
      facets.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f.institution;
        opt.textContent = `${f.institution} (${f.count})`;
        fInst.appendChild(opt);
      });
    }
  } else {
    profFiltersEl.classList.remove("visible");
  }

  try {
    const extra = currentDomain === "professors" ? profFilters : {};
    const payload = await apiList(currentDomain, extra);
    renderList(payload);
    statsBox.innerHTML = `<div class="stat"><div class="label">总数</div><div class="value">${currentTotal}</div></div>`;
    if (currentDomain === "companies") {
      const facets = await apiIndustryFacets();
      facets.slice(0, 5).forEach(f => {
        statsBox.innerHTML += `<div class="stat"><div class="label">${esc(f.industry)}</div><div class="value">${f.count}</div></div>`;
      });
    }
  } catch (e) {
    errorBox.style.display = "block";
    errorBox.textContent = `加载失败: ${e.message}`;
    listTable.querySelector("tbody").innerHTML = "";
  }
}

// ============ Event wiring ============
document.querySelectorAll("#tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentDomain = btn.dataset.domain;
    currentPage = 1;
    currentQuery = "";
    searchBox.value = "";
    loadDomain();
  });
});

document.getElementById("prev").addEventListener("click", () => {
  if (currentPage > 1) { currentPage -= 1; loadDomain(); }
});
document.getElementById("next").addEventListener("click", () => {
  if (currentPage * PAGE_SIZE < currentTotal) { currentPage += 1; loadDomain(); }
});
searchBox.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    currentQuery = searchBox.value.trim();
    currentPage = 1;
    loadDomain();
  }
});

// Filter-bar wiring (professors only)
[fInst, fDisc, fVerified].forEach(el => {
  el.addEventListener("change", () => {
    profFilters = {
      institution: fInst.value,
      discipline_family: fDisc.value,
      has_verified_papers: fVerified.checked,
    };
    currentPage = 1;
    loadDomain();
  });
});
document.getElementById("f-clear").addEventListener("click", () => {
  fInst.value = ""; fDisc.value = ""; fVerified.checked = false;
  profFilters = { institution: "", discipline_family: "", has_verified_papers: false };
  currentPage = 1;
  loadDomain();
});

// Filter-bar wiring (issues)
[ifStage, ifSeverity, ifReportedBy, ifResolved].forEach(el => {
  el.addEventListener("change", () => {
    issueFilters = {
      stage: ifStage.value,
      severity: ifSeverity.value,
      reported_by: ifReportedBy.value,
      resolved: ifResolved.checked,
      q: ifQ.value.trim(),
    };
    currentPage = 1;
    loadDomain();
  });
});
ifQ.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    issueFilters.q = ifQ.value.trim();
    currentPage = 1;
    loadDomain();
  }
});
document.getElementById("if-clear").addEventListener("click", () => {
  ifStage.value = ""; ifSeverity.value = ""; ifReportedBy.value = "";
  ifResolved.checked = false; ifQ.value = "";
  issueFilters = { stage: "", severity: "", reported_by: "", resolved: false, q: "" };
  currentPage = 1;
  if (currentDomain === "issues") loadDomain();
});

// Initial load: guard strip + default domain
loadGuardStrip();
loadDomain();
</script>
</body></html>
