# Alembic configuration for the Shenzhen Sci-Tech knowledge graph Postgres store.
# Plan: docs/plans/2026-04-17-005-company-primary-knowledge-graph-architecture-plan.md
#
# Usage:
#   cd apps/miroflow-agent
#   DATABASE_URL=postgresql+psycopg://user:pass@host:5432/db uv run alembic upgrade head
#
# env.py resolves sqlalchemy.url from the DATABASE_URL environment variable at
# runtime, so the placeholder below is intentionally empty.

[alembic]
script_location = alembic
sqlalchemy.url =

# Use revision id as filename prefix; keeps V001_, V002_, ... ordering readable.
file_template = %%(rev)s_%%(slug)s

timezone = UTC
truncate_slug_length = 40

revision_environment = false
sourceless = false

[post_write_hooks]
# ruff is managed via the repo-level `uv tool run ruff@0.8.0`; not wired here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
